services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./backup:/backup
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
  mongo-express:
    image: mongo-express:latest
    restart: unless-stopped
    # ports ကို ဖြုတ်လိုက်လို့ရသလို၊ 8081:8081 လို့ပဲ ထားလည်း ရပါတယ်
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_SITE_BASEURL: /mongo/
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_PASS}
    depends_on:
      mongo:
        condition: service_healthy


  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/studentdb
      PORT: 5000
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:8080}"
      UPLOAD_DIR: /uploads
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-change-this-password}"
      JWT_SECRET: "${JWT_SECRET:-change-this-to-a-long-random-secret}"
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./data/uploads:/uploads
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-4173}:4173"
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo-data:
